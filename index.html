<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Huey Coyote | Changarro Web</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #f4f1ea;
            overflow-x: hidden;
        }

        /* ===== LA CORTINA DE ACERO ===== */
        #cortina {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: transform 1.8s cubic-bezier(0.65, 0, 0.35, 1);
            cursor: pointer;
        }

        /* Textura de lamina acanalada */
        #cortina::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(180deg, #1d6e3f 0%, #15512d 50%, #0d3a1c 100%);
            z-index: -2;
        }

        #cortina::after {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 18px,
                rgba(0,0,0,0.25) 18px,
                rgba(0,0,0,0.25) 20px
            );
            z-index: -1;
        }

        .rotulo {
            color: #f1c40f;
            font-size: clamp(2.5rem, 8vw, 6rem);
            font-weight: 900;
            text-transform: uppercase;
            text-shadow: 3px 3px 0px #c0392b, 6px 6px 0px rgba(0,0,0,0.8);
            text-align: center;
            line-height: 1.1;
            padding: 0 20px;
            z-index: 1;
        }

        .sub-rotulo {
            color: #fff;
            font-size: clamp(0.9rem, 2.5vw, 1.5rem);
            margin-top: 20px;
            font-weight: bold;
            background-color: rgba(0,0,0,0.85);
            padding: 8px 20px;
            text-transform: uppercase;
            letter-spacing: 3px;
            z-index: 1;
        }

        .abrir-btn {
            margin-top: 50px;
            padding: 15px 35px;
            font-size: clamp(0.9rem, 2vw, 1.2rem);
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            color: #fff;
            background-color: #c0392b;
            border: 3px solid #000;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 4px 4px 0px #000;
            transition: all 0.2s ease;
            z-index: 1;
        }

        .abrir-btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px #000;
            background-color: #e74c3c;
        }

        .abrir-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #000;
        }

        /* Animacion: cortina sube */
        .cortina-arriba {
            transform: translateY(-100%);
        }

        /* ===== EL CHANGARRO ===== */
        #changarro {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 50px 20px;
            text-align: center;
            background-color: #f4f1ea;
            background-image: 
                linear-gradient(rgba(0,0,0,0.05) 1px, transparent 1px);
            background-size: 100% 25px;
        }

        #changarro h2 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            color: #c0392b;
            margin-bottom: 25px;
            text-transform: uppercase;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.3);
        }

        #changarro p {
            font-size: 1.1rem;
            max-width: 600px;
            line-height: 1.8;
            margin-bottom: 30px;
            background-color: #fff;
            padding: 25px;
            border: 2px dashed #333;
        }

        .cerrar-btn {
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            color: #fff;
            background-color: #2c3e50;
            border: 3px solid #000;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 4px 4px 0px #000;
            transition: all 0.2s ease;
        }

        .cerrar-btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px #000;
        }
    </style>
</head>
<body>

    <!-- La Cortina de Acero -->
    <div id="cortina">
        <div class="rotulo">El Huey<br>Coyote</div>
        <div class="sub-rotulo">Musica, Sudor y Cumbia</div>
        <button class="abrir-btn" onclick="abrirCortina()">&#9654; Levantar Cortina</button>
    </div>

    <!-- El Changarro -->
    <div id="changarro">
        <h2>Pasele, ya abrimos</h2>
        <p>Aqui va a ir todo el changarro digital. Shows, merch, fotos y el portafolio completo.<br><br><b>Sitio en construccion - Arquitectura HAZ</b></p>
        <button class="cerrar-btn" onclick="bajarCortina()">&#9660; Cerrar Changarro</button>
    </div>

    <script>
        function abrirCortina() {
            document.getElementById('cortina').classList.add('cortina-arriba');
        }
        function bajarCortina() {
            document.getElementById('cortina').classList.remove('cortina-arriba');
        }
    </script>
</body>
</html>
