<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>El Huey Coyote — Header preview v7</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            background: #1a1a1a;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .header-wrap {
            position: relative;
            width: 100vw;
            max-width: 540px;
            margin: 0 auto;
        }

        .header-wrap img.header-design {
            display: block;
            width: 100%;
            height: auto;
        }

        /* Texto invisible para SEO/buscadores (Google) y lectores de pantalla */
        .seo-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        .preview-tag {
            position: fixed;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.75);
            color: #ffd84a;
            font-family: monospace;
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 3px;
            z-index: 100;
            pointer-events: none;
        }

        @media (min-width: 540px) {
            body {
                display: flex;
                justify-content: center;
                align-items: flex-start;
                padding-top: 20px;
            }
            .header-wrap {
                max-height: calc(100vh - 40px);
            }
            .header-wrap img.header-design {
                max-height: calc(100vh - 40px);
                width: auto;
            }
        }
    </style>
</head>
<body>
    <header class="header-wrap">
        <!-- Imagen del diseño completo de Anette (idéntico al .ai) -->
        <img class="header-design" src="assets/header-completo.png" alt="El Huey Coyote — Pide para llevar, próximos shows, échame un grito">

        <!-- Textos para SEO (invisibles visualmente pero leídos por Google y lectores de pantalla) -->
        <h1 class="seo-only">El Huey Coyote</h1>
        <p class="seo-only">Pide para llevar</p>
        <h2 class="seo-only">Próximos shows</h2>
        <p class="seo-only">¿Ya me conoces? Échame un grito</p>
    </header>

    <div class="preview-tag">v7 · imagen completa (idéntico al diseño)</div>
</body>
</html>
