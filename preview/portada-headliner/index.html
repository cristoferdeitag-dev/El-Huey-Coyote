<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>El Huey Coyote — Portada + Headliner</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            background: #1a1a1a;
            min-height: 100vh;
            overflow-x: hidden;
            font-family: system-ui, -apple-system, sans-serif;
        }

        /* Container general que centra todo en pantallas grandes (PC) */
        .site-wrap {
            position: relative;
            width: 100vw;
            max-width: 540px;
            margin: 0 auto;
        }

        /* === HEADLINER (capa de abajo, siempre presente) === */
        .headliner {
            position: relative;
            width: 100%;
            background: #1a1a1a;
        }
        .headliner img {
            display: block;
            width: 100%;
            height: auto;
        }

        /* === PORTADA (capa de arriba, cortina que sube) === */
        .portada {
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 540px;
            height: 100vh;
            z-index: 100;
            background: #2dbf86;
            overflow: hidden;
            cursor: pointer;
            transition: transform 1.6s cubic-bezier(0.65, 0, 0.35, 1);
            will-change: transform;
        }

        .portada img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
        }

        /* Cuando se levanta la cortina */
        .portada.subida {
            transform: translateX(-50%) translateY(-100%);
        }

        /* Texto SEO oculto */
        .seo-only {
            position: absolute;
            width: 1px; height: 1px;
            padding: 0; margin: -1px;
            overflow: hidden;
            clip: rect(0,0,0,0);
            white-space: nowrap;
            border: 0;
        }

        /* Etiqueta de preview (temporal) */
        .preview-tag {
            position: fixed;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.75);
            color: #ffd84a;
            font-family: monospace;
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 3px;
            z-index: 200;
            pointer-events: none;
        }

        @media (min-width: 540px) {
            body {
                display: flex;
                justify-content: center;
                background: #0d0d0d;
            }
            .site-wrap {
                max-width: 540px;
            }
            .portada {
                max-width: 540px;
            }
        }
    </style>
</head>
<body>
    <div class="site-wrap">

        <!-- HEADLINER detrás (siempre presente) -->
        <section class="headliner" id="headliner">
            <img src="assets/headliner.png" alt="El Huey Coyote — Pide para llevar, próximos shows, échame un grito">
            <h1 class="seo-only">El Huey Coyote</h1>
            <p class="seo-only">Pide para llevar · Próximos shows · ¿Ya me conoces? Échame un grito</p>
        </section>

        <!-- PORTADA encima (cortina verde que sube al click) -->
        <button class="portada" id="portada" aria-label="Abre el changarro">
            <img src="assets/portada.png" alt="El Huey Coyote — Abre el changarro">
        </button>
    </div>

    <div class="preview-tag">Portada → Headliner · click para abrir</div>

    <script>
        const portada = document.getElementById('portada');
        portada.addEventListener('click', function () {
            portada.classList.add('subida');
            // Después de la animación, quitamos pointer-events
            setTimeout(() => {
                portada.style.pointerEvents = 'none';
            }, 1600);
        });
    </script>
</body>
</html>
