<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Huey Coyote | Música, Sudor y Cumbia</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Permanent+Marker&family=Oswald:wght@400;700&family=Special+Elite&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --rojo: #c0392b;
            --rojo-vivo: #e74c3c;
            --amarillo: #f1c40f;
            --naranja: #ff931e;
            --verde: #4eb32e;
            --verde-oscuro: #1d6e3f;
            --negro: #1a1a1a;
            --blanco: #f4f1ea;
            --azul-logo: #1ab1e5;
            --azul-oscuro: #1b1464;
        }

        html { scroll-behavior: smooth; }
        body { font-family: 'Oswald', sans-serif; background: var(--negro); color: var(--blanco); overflow-x: hidden; }

        /* ========================
           PANTALLA INICIO (CORTINA VERDE)
        ======================== */
        #pantalla-inicio {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            cursor: pointer;
            transition: transform 1.8s cubic-bezier(0.65, 0, 0.35, 1);
        }

        #pantalla-inicio .fondo-cortina {
            position: absolute;
            inset: 0;
            background-image: url('assets/img/cortina-huey.png');
            background-size: cover;
            background-position: center;
            z-index: 0;
        }

        #pantalla-inicio .overlay-cortina {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.1);
            z-index: 1;
        }

        .btn-abrir {
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
            padding: 10px 20px;
            background: none;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-abrir img {
            width: clamp(250px, 35vw, 500px);
            height: auto;
            filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.5));
            transition: all 0.3s ease;
        }

        .btn-abrir:hover img {
            filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.5)) brightness(1.2);
            transform: scale(1.08);
        }

        .cortina-sube { transform: translateY(-100%); }

        /* ========================
           HERO - CHANGARRO PRINCIPAL
        ======================== */
        #hero {
            position: relative;
            width: 100%;
            min-height: 100vh;
            overflow: hidden;
        }

        .hero-bg {
            position: absolute;
            inset: 0;
            background-image: url('assets/img/changarro-hero.png');
            background-size: cover;
            background-position: center top;
            z-index: 0;
        }

        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.4) 100%);
            z-index: 1;
        }

        .hero-nav-buttons {
            position: absolute;
            inset: 0;
            z-index: 2;
        }

        /* Botones de navegación posicionados sobre la foto */
        .hero-btn {
            position: absolute;
            display: block;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .hero-btn:hover {
            transform: scale(1.08);
            filter: brightness(1.2);
        }

        .hero-btn img {
            width: 100%;
            height: auto;
            filter: drop-shadow(2px 3px 4px rgba(0,0,0,0.6));
        }

        /* Posiciones de los botones sobre el changarro */
        .hero-btn-shows {
            left: 5%;
            top: 28%;
            width: clamp(100px, 15vw, 230px);
        }

        .hero-btn-colabs {
            left: 8%;
            top: 52%;
            width: clamp(50px, 6vw, 95px);
        }

        .hero-btn-llevar {
            left: 50%;
            transform: translateX(-50%);
            top: 12%;
            width: clamp(110px, 15vw, 230px);
        }

        .hero-btn-conoces {
            right: 5%;
            top: 15%;
            width: clamp(110px, 17vw, 270px);
        }

        .hero-btn-grito {
            right: 6%;
            top: 40%;
            width: clamp(110px, 15vw, 230px);
        }

        /* ========================
           SECCIONES PLACEHOLDER
        ======================== */
        .seccion-placeholder {
            min-height: 50vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 60px 20px;
            border-top: 3px solid var(--amarillo);
        }

        .seccion-placeholder h2 {
            font-family: 'Permanent Marker', cursive;
            font-size: clamp(1.5rem, 4vw, 3rem);
            color: var(--amarillo);
            text-shadow: 3px 3px 0 var(--rojo);
        }

        .seccion-placeholder p {
            font-family: 'Oswald', sans-serif;
            font-size: 1.1rem;
            margin-top: 15px;
            color: var(--blanco);
            opacity: 0.5;
        }

        /* ========================
           RESPONSIVE
        ======================== */
        @media (max-width: 768px) {
            .hero-btn-shows { left: 3%; top: 25%; width: 90px; }
            .hero-btn-colabs { left: 5%; top: 48%; width: 45px; }
            .hero-btn-llevar { top: 8%; width: 90px; }
            .hero-btn-conoces { right: 3%; top: 12%; width: 90px; }
            .hero-btn-grito { right: 4%; top: 35%; width: 90px; }
        }

        @media (max-width: 480px) {
            .hero-btn-shows { left: 2%; top: 22%; width: 70px; }
            .hero-btn-colabs { left: 3%; top: 45%; width: 35px; }
            .hero-btn-llevar { top: 5%; width: 70px; }
            .hero-btn-conoces { right: 2%; top: 10%; width: 70px; }
            .hero-btn-grito { right: 3%; top: 30%; width: 70px; }
        }
    </style>
</head>
<body>

    <!-- PANTALLA INICIO - Cortina verde metálica -->
    <div id="pantalla-inicio">
        <div class="fondo-cortina"></div>
        <div class="overlay-cortina"></div>
        <button class="btn-abrir" onclick="abrirCortina()">
            <img src="assets/img/btn-changarro.svg" alt="Abre el Changarro">
        </button>
    </div>

    <!-- HERO - Changarro Principal con navegación -->
    <section id="hero">
        <div class="hero-bg"></div>
        <div class="hero-overlay"></div>
        <div class="hero-nav-buttons">
            <!-- Izquierda: Shows + Colabs -->
            <a href="#shows" class="hero-btn hero-btn-shows">
                <img src="assets/img/btn-proximos-shows.svg" alt="Próximos Shows">
            </a>
            <a href="#colabs" class="hero-btn hero-btn-colabs">
                <img src="assets/img/btn-colabs.svg" alt="Colabs">
            </a>

            <!-- Centro arriba: Pide para llevar -->
            <a href="#merch" class="hero-btn hero-btn-llevar">
                <img src="assets/img/btn-pide-para-llevar.svg" alt="Pide para Llevar">
            </a>

            <!-- Derecha: Ya me conoces + Échame un grito -->
            <a href="#about" class="hero-btn hero-btn-conoces">
                <img src="assets/img/btn-ya-me-conoces.svg" alt="¿Ya me Conoces?">
            </a>
            <a href="#contacto" class="hero-btn hero-btn-grito">
                <img src="assets/img/btn-echame-un-grito.svg" alt="Échame un Grito">
            </a>
        </div>
    </section>

    <!-- Secciones placeholder -->
    <section id="shows" class="seccion-placeholder">
        <div><h2>Próximos Shows</h2><p>En construcción...</p></div>
    </section>
    <section id="colabs" class="seccion-placeholder">
        <div><h2>Colabs</h2><p>En construcción...</p></div>
    </section>
    <section id="merch" class="seccion-placeholder">
        <div><h2>Pide para Llevar</h2><p>En construcción...</p></div>
    </section>
    <section id="about" class="seccion-placeholder">
        <div><h2>¿Ya me Conoces?</h2><p>En construcción...</p></div>
    </section>
    <section id="contacto" class="seccion-placeholder">
        <div><h2>Échame un Grito</h2><p>En construcción...</p></div>
    </section>

    <script>
        function abrirCortina() {
            document.getElementById('pantalla-inicio').classList.add('cortina-sube');
            setTimeout(() => {
                document.getElementById('pantalla-inicio').style.display = 'none';
            }, 1900);
        }
    </script>
</body>
</html>
