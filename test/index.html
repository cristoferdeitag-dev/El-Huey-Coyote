<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Huey Coyote | Música, Sudor y Cumbia</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Permanent+Marker&family=Oswald:wght@400;700&family=Special+Elite&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --rojo: #c0392b;
            --rojo-vivo: #e74c3c;
            --amarillo: #f1c40f;
            --naranja: #ff931e;
            --verde: #4eb32e;
            --verde-oscuro: #1d6e3f;
            --negro: #1a1a1a;
            --blanco: #f4f1ea;
            --azul-logo: #1ab1e5;
            --azul-oscuro: #1b1464;
        }

        html { scroll-behavior: smooth; }
        body { font-family: 'Oswald', sans-serif; background: var(--negro); color: var(--blanco); overflow-x: hidden; }

        /* ========================
           PANTALLA INICIO (CORTINA VERDE)
        ======================== */
        #pantalla-inicio {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            cursor: pointer;
            transition: transform 1.8s cubic-bezier(0.65, 0, 0.35, 1);
        }

        #pantalla-inicio .fondo-cortina {
            position: absolute;
            inset: 0;
            background-image: url('assets/img/cortina-huey.png');
            background-size: cover;
            background-position: center;
            z-index: 0;
        }

        #pantalla-inicio .overlay-cortina {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.1);
            z-index: 1;
        }

        .btn-abrir {
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
            padding: 10px 20px;
            background: none;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-abrir img {
            width: clamp(250px, 35vw, 500px);
            height: auto;
            filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.5));
            transition: all 0.3s ease;
        }

        .btn-abrir:hover img {
            filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.5)) brightness(1.2);
            transform: scale(1.08);
        }

        .cortina-sube { transform: translateY(-100%); }

        /* ========================
           HERO - CHANGARRO PRINCIPAL
        ======================== */
        #hero {
            position: relative;
            width: 100%;
        }

        #hero img.hero-img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Botones invisibles sobre la imagen */
        .hero-hotspot {
            position: absolute;
            cursor: pointer;
            z-index: 2;
            border: 2px dashed rgba(255,0,0,0.7);
            transition: background 0.3s ease;
        }

        .hero-hotspot:hover {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 6px;
        }

        /* Posiciones en porcentaje sobre la imagen */
        .hs-shows {
            left: 1%;
            top: 20%;
            width: 16%;
            height: 25%;
        }

        .hs-colabs {
            left: 24%;
            top: 30%;
            width: 8%;
            height: 8%;
        }

        .hs-llevar {
            left: 22%;
            top: 4%;
            width: 18%;
            height: 12%;
        }

        .hs-conoces {
            left: 58%;
            top: 4%;
            width: 20%;
            height: 14%;
        }

        .hs-grito {
            left: 60%;
            top: 20%;
            width: 18%;
            height: 10%;
        }

        .hs-apple-music-1 {
            left: 4%;
            top: 72%;
            width: 8%;
            height: 12%;
        }

        .hs-apple-music-2 {
            left: 18%;
            top: 76%;
            width: 6%;
            height: 8%;
        }

        .hs-apple-music-3 {
            left: 28%;
            top: 76%;
            width: 6%;
            height: 8%;
        }

        .hs-spotify {
            left: 38%;
            top: 72%;
            width: 9%;
            height: 12%;
        }

        /* ========================
           SEPARADOR DE SECCIONES
        ======================== */
        .seccion-separador {
            background: var(--rojo);
            padding: 20px 0;
            text-align: center;
            border-top: 4px solid var(--amarillo);
            border-bottom: 4px solid var(--amarillo);
            position: relative;
            overflow: hidden;
        }

        .seccion-separador::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 10px,
                rgba(0,0,0,0.05) 10px,
                rgba(0,0,0,0.05) 20px
            );
        }

        .seccion-separador h2 {
            font-family: 'Permanent Marker', cursive;
            font-size: clamp(2rem, 5vw, 3.5rem);
            color: var(--amarillo);
            text-shadow: 3px 3px 0 rgba(0,0,0,0.4);
            letter-spacing: 3px;
            position: relative;
            z-index: 1;
        }

        /* ========================
           SECCIÓN SHOWS
        ======================== */
        #shows {
            background: var(--blanco);
            padding: 0;
        }

        #shows img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* ========================
           SECCIONES PLACEHOLDER
        ======================== */
        .seccion-placeholder {
            min-height: 50vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 60px 20px;
            border-top: 3px solid var(--amarillo);
        }

        .seccion-placeholder h2 {
            font-family: 'Permanent Marker', cursive;
            font-size: clamp(1.5rem, 4vw, 3rem);
            color: var(--amarillo);
            text-shadow: 3px 3px 0 var(--rojo);
        }

        .seccion-placeholder p {
            font-family: 'Oswald', sans-serif;
            font-size: 1.1rem;
            margin-top: 15px;
            color: var(--blanco);
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <!-- PANTALLA INICIO - Cortina verde metálica -->
    <div id="pantalla-inicio">
        <div class="fondo-cortina"></div>
        <div class="overlay-cortina"></div>
        <button class="btn-abrir" onclick="abrirCortina()">
            <img src="assets/img/btn-changarro.svg" alt="Abre el Changarro">
        </button>
    </div>

    <!-- HERO - Changarro Principal con navegación -->
    <section id="hero">
        <img src="assets/img/changarro-hero.png" alt="El Huey Coyote - Changarro" class="hero-img">

        <!-- Botones invisibles posicionados sobre los letreros -->
        <a href="#shows" class="hero-hotspot hs-shows" title="Próximos Shows"></a>
        <a href="#colabs" class="hero-hotspot hs-colabs" title="Colabs"></a>
        <a href="#merch" class="hero-hotspot hs-llevar" title="Pide para Llevar"></a>
        <a href="#about" class="hero-hotspot hs-conoces" title="¿Ya me Conoces?"></a>
        <a href="#contacto" class="hero-hotspot hs-grito" title="Échame un Grito"></a>
        <a href="#" class="hero-hotspot hs-apple-music-1" title="Apple Music" target="_blank"></a>
        <a href="#" class="hero-hotspot hs-apple-music-2" title="Apple Music" target="_blank"></a>
        <a href="#" class="hero-hotspot hs-apple-music-3" title="Apple Music" target="_blank"></a>
        <a href="#" class="hero-hotspot hs-spotify" title="Spotify" target="_blank"></a>
    </section>

    <!-- SEPARADOR: Próximos Shows -->
    <div class="seccion-separador">
        <h2>🌮 Próximos Shows 🌮</h2>
    </div>

    <!-- SECCIÓN: Shows - Menú de taquería -->
    <section id="shows">
        <img src="assets/img/shows-menu.png" alt="Próximos Shows - El Huey Coyote">
    </section>
    <section id="colabs" class="seccion-placeholder">
        <div><h2>Colabs</h2><p>En construcción...</p></div>
    </section>
    <!-- SEPARADOR: Merch -->
    <div class="seccion-separador">
        <h2>🛍️ Pide Para Llevar 🛍️</h2>
    </div>

    <!-- SECCIÓN: Merch - Llévele Llévele -->
    <section id="merch">
        <img src="assets/img/merch-llevele.png" alt="Merch - Llévele Llévele" style="width:100%;height:auto;display:block;">
    </section>
    <section id="about" class="seccion-placeholder">
        <div><h2>¿Ya me Conoces?</h2><p>En construcción...</p></div>
    </section>
    <section id="contacto" class="seccion-placeholder">
        <div><h2>Échame un Grito</h2><p>En construcción...</p></div>
    </section>

    <script>
        function abrirCortina() {
            var cortina = document.getElementById('pantalla-inicio');
            // Scroll al inicio para ver hero completo
            window.scrollTo(0, 0);
            // Sube la cortina completa
            cortina.classList.add('cortina-sube');
            setTimeout(function() {
                cortina.style.display = 'none';
            }, 1900);
        }
    </script>
</body>
</html>
