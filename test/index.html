<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Huey Coyote | M&uacute;sica, Sudor y Cumbia</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Permanent+Marker&family=Oswald:wght@400;700&family=Special+Elite&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --rojo: #c0392b;
            --rojo-vivo: #e74c3c;
            --amarillo: #f1c40f;
            --naranja: #ff931e;
            --verde: #4eb32e;
            --verde-oscuro: #1d6e3f;
            --negro: #1a1a1a;
            --blanco: #f4f1ea;
            --azul-logo: #1ab1e5;
            --azul-oscuro: #1b1464;
        }

        html { scroll-behavior: smooth; }
        body { font-family: 'Oswald', sans-serif; background: var(--negro); color: var(--blanco); overflow-x: hidden; }

        /* ========================
           PANTALLA INICIO (CORTINA VERDE)
        ======================== */
        #pantalla-inicio {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            cursor: pointer;
            transition: transform 1.8s cubic-bezier(0.65, 0, 0.35, 1);
        }

        #pantalla-inicio .fondo-cortina {
            position: absolute;
            inset: 0;
            background-image: url('assets/img/cortina-huey.png');
            background-size: cover;
            background-position: center;
            z-index: 0;
        }

        #pantalla-inicio .overlay-cortina {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.1);
            z-index: 1;
        }

        .btn-abrir {
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
            padding: 10px 20px;
            background: none;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-abrir img {
            width: clamp(250px, 35vw, 500px);
            height: auto;
            filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.5));
            transition: all 0.3s ease;
        }

        .btn-abrir:hover img {
            filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.5)) brightness(1.2);
            transform: scale(1.08);
        }

        .cortina-sube { transform: translateY(-100%); }

        /* ========================
           HERO - CHANGARRO PRINCIPAL
        ======================== */
        #hero {
            position: relative;
            width: 100%;
            overflow: hidden;
        }

        #hero img.hero-img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* ========================
           SEPARADOR DE SECCIONES
        ======================== */
        .seccion-separador {
            background: var(--rojo);
            padding: 20px 0;
            text-align: center;
            border-top: 4px solid var(--amarillo);
            border-bottom: 4px solid var(--amarillo);
            position: relative;
            overflow: hidden;
        }

        .seccion-separador::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 10px,
                rgba(0,0,0,0.05) 10px,
                rgba(0,0,0,0.05) 20px
            );
        }

        .seccion-separador h2 {
            font-family: 'Permanent Marker', cursive;
            font-size: clamp(2rem, 5vw, 3.5rem);
            color: var(--amarillo);
            text-shadow: 3px 3px 0 rgba(0,0,0,0.4);
            letter-spacing: 3px;
            position: relative;
            z-index: 1;
        }

        /* ========================
           SECCIONES CON IMAGEN
        ======================== */
        .seccion-img img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* ========================
           SECCIONES PLACEHOLDER
        ======================== */
        .seccion-placeholder {
            min-height: 50vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 60px 20px;
            border-top: 3px solid var(--amarillo);
        }

        .seccion-placeholder h2 {
            font-family: 'Permanent Marker', cursive;
            font-size: clamp(1.5rem, 4vw, 3rem);
            color: var(--amarillo);
            text-shadow: 3px 3px 0 var(--rojo);
        }

        .seccion-placeholder p {
            font-family: 'Oswald', sans-serif;
            font-size: 1.1rem;
            margin-top: 15px;
            color: var(--blanco);
            opacity: 0.5;
        }
        /* ========================
           HEADER / NAV
        ======================== */
        .site-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(26,26,26,0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--amarillo);
            padding: 10px 20px;
            display: none;
        }

        .site-nav.visible { display: flex; }

        .site-nav-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }

        .site-nav .nav-logo {
            font-family: 'Permanent Marker', cursive;
            font-size: 1.4rem;
            color: var(--amarillo);
            text-shadow: 2px 2px 0 var(--rojo);
        }

        .site-nav .nav-links {
            display: flex;
            gap: 6px;
            list-style: none;
            flex-wrap: wrap;
            justify-content: center;
        }

        .site-nav .nav-links a {
            font-family: 'Oswald', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--blanco);
            text-decoration: none;
            padding: 6px 12px;
            border-radius: 4px;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .site-nav .nav-links a:hover {
            background: var(--rojo);
            color: var(--amarillo);
        }

        /* ========================
           FOOTER
        ======================== */
        .site-footer {
            background: var(--negro);
            border-top: 4px solid var(--amarillo);
            padding: 50px 20px 30px;
            text-align: center;
        }

        .footer-inner {
            max-width: 600px;
            margin: 0 auto;
        }

        .footer-logo {
            font-family: 'Permanent Marker', cursive;
            font-size: clamp(2rem, 4vw, 2.8rem);
            color: var(--amarillo);
            text-shadow: 3px 3px 0 var(--rojo);
            margin-bottom: 6px;
        }

        .footer-tagline {
            font-family: 'Special Elite', cursive;
            font-size: 1rem;
            color: var(--azul-logo);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 24px;
        }

        .footer-social {
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }

        .footer-social a {
            font-family: 'Oswald', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--blanco);
            text-decoration: none;
            padding: 8px 16px;
            border: 2px solid var(--amarillo);
            border-radius: 4px;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .footer-social a:hover {
            background: var(--amarillo);
            color: var(--negro);
        }

        .footer-line {
            width: 60px;
            height: 3px;
            background: var(--rojo);
            margin: 0 auto 16px;
        }

        .footer-copy {
            font-family: 'Oswald', sans-serif;
            font-size: 0.75rem;
            color: rgba(244,241,234,0.4);
            letter-spacing: 1px;
        }

        /* ========================
           SPOTIFY PLAYER
        ======================== */
        .spotify-player {
            position: fixed;
            bottom: 10px;
            right: 10px;
            z-index: 99;
            width: 300px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            display: none;
            transition: opacity 0.3s;
        }

        .spotify-player.visible { display: block; }

        .spotify-player iframe {
            display: block;
            width: 100%;
            height: 152px;
            border: none;
        }

        /* Adjust footer padding to not be hidden behind player */
        .site-footer { padding-bottom: 60px; }

        @media (max-width: 768px) {
            .site-nav .nav-links { gap: 2px; }
            .site-nav .nav-links a { font-size: 0.7rem; padding: 4px 8px; }
            .site-nav .nav-logo { font-size: 1.1rem; }
            .footer-social a { font-size: 0.75rem; padding: 6px 12px; }
        }
        /* ========================
           SCROLL ANIMATIONS (initial state)
        ======================== */
        .anim-ready .seccion-img {
            opacity: 0;
            transform: translateY(60px);
        }

        .anim-ready .seccion-separador {
            opacity: 0;
            transform: scale(0.9);
        }

        .anim-ready .site-footer {
            opacity: 0;
            transform: translateY(40px);
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
</head>
<body>

    <!-- HEADER / NAV -->
    <nav class="site-nav" id="site-nav">
        <div class="site-nav-inner">
            <img src="assets/img/logo-hueycoyote.svg" alt="El Huey Coyote" style="height:36px;width:auto;">
            <ul class="nav-links">
                <li><a href="#hero">Inicio</a></li>
                <li><a href="#shows">Shows</a></li>
                <li><a href="#merch">Merch</a></li>
                <li><a href="#colabs">Collabs</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#contacto">Contacto</a></li>
            </ul>
        </div>
    </nav>

    <!-- PANTALLA INICIO - Cortina verde metálica -->
    <div id="pantalla-inicio">
        <div class="fondo-cortina"></div>
        <div class="overlay-cortina"></div>
        <button class="btn-abrir" onclick="abrirCortina()">
            <img src="assets/img/btn-changarro.svg" alt="Abre el Changarro">
        </button>
    </div>

    <!-- HERO - Changarro Principal -->
    <section id="hero">
        <img src="assets/img/changarro-hero.png" alt="El Huey Coyote - Changarro" class="hero-img">
    </section>

    <!-- SEPARADOR: Próximos Shows -->
    <div class="seccion-separador">
        <h2>🌮 Próximos Shows 🌮</h2>
    </div>

    <!-- SECCIÓN: Shows -->
    <section id="shows" class="seccion-img">
        <img src="assets/img/shows-menu.png" alt="Próximos Shows - El Huey Coyote">
    </section>

    <!-- SEPARADOR: Merch -->
    <div class="seccion-separador">
        <h2>👕 La Merch 🧢</h2>
    </div>

    <!-- SECCIÓN: Merch -->
    <section id="merch" class="seccion-img">
        <img src="assets/img/merch-llevele.png" alt="Merch - Llévele Llévele">
    </section>

    <!-- SEPARADOR: Collabs -->
    <div class="seccion-separador">
        <h2>🍺 Collabs Destacadas 🍺</h2>
    </div>

    <!-- SECCIÓN: Collabs -->
    <section id="colabs" class="seccion-img">
        <img src="assets/img/collabs-rejas.png" alt="Collabs Destacadas">
    </section>

    <!-- SEPARADOR: About -->
    <div class="seccion-separador">
        <h2>¿Ya me Conoces?</h2>
    </div>

    <!-- SECCIÓN: About -->
    <section id="about" class="seccion-img">
        <img src="assets/img/about-conoces.png" alt="¿Ya me Conoces? - El Huey Coyote">
    </section>

    <!-- SEPARADOR: Contacto -->
    <div class="seccion-separador">
        <h2>📞 ¡Échame un Grito! 📞</h2>
    </div>

    <!-- SECCIÓN: Contacto -->
    <section id="contacto" class="seccion-img">
        <img src="assets/img/contacto-echame.png" alt="Échame un Grito - Contacto">
    </section>

    <!-- SPOTIFY MINI PLAYER -->
    <div class="spotify-player" id="spotify-player">
        <iframe src="https://open.spotify.com/embed/album/5wmzvhLzXU1Y2BSbE15B4p?utm_source=generator&theme=0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
    </div>

    <!-- FOOTER -->
    <footer class="site-footer">
        <div class="footer-inner">
            <div class="footer-logo"><img src="assets/img/logo-hueycoyote.svg" alt="El Huey Coyote" style="height:80px;width:auto;"></div>
            <div class="footer-tagline">Música, Sudor y Cumbia</div>
            <div class="footer-social">
                <a href="#" title="Instagram" target="_blank">Instagram</a>
                <a href="#" title="TikTok" target="_blank">TikTok</a>
                <a href="#" title="YouTube" target="_blank">YouTube</a>
                <a href="#" title="Spotify" target="_blank">Spotify</a>
                <a href="#" title="Apple Music" target="_blank">Apple Music</a>
            </div>
            <div class="footer-line"></div>
            <div class="footer-copy">&copy; 2026 El Huey Coyote. Todos los derechos reservados.</div>
        </div>
    </footer>

    <script>
        function abrirCortina() {
            var cortina = document.getElementById('pantalla-inicio');
            window.scrollTo(0, 0);
            cortina.classList.add('cortina-sube');
            setTimeout(function() {
                cortina.style.display = 'none';
                document.getElementById('site-nav').classList.add('visible');
                document.getElementById('spotify-player').classList.add('visible');
                initAnimations();
            }, 1900);
        }

        function initAnimations() {
            gsap.registerPlugin(ScrollTrigger);

            // Add class to body so CSS initial states activate
            document.body.classList.add('anim-ready');

            // Force ScrollTrigger to recalculate on mobile
            ScrollTrigger.refresh();

            // Hero image — subtle parallax
            gsap.to('#hero .hero-img', {
                yPercent: 15,
                ease: 'none',
                scrollTrigger: {
                    trigger: '#hero',
                    start: 'top top',
                    end: 'bottom top',
                    scrub: true
                }
            });

            // Section images — fade in + slide up
            gsap.utils.toArray('.seccion-img').forEach(function(section) {
                gsap.to(section, {
                    opacity: 1,
                    y: 0,
                    duration: 1,
                    ease: 'power3.out',
                    scrollTrigger: {
                        trigger: section,
                        start: 'top 85%',
                        toggleActions: 'play none none none'
                    }
                });

                // Image inside — subtle zoom on enter
                var img = section.querySelector('img');
                if (img) {
                    gsap.from(img, {
                        scale: 1.08,
                        duration: 1.5,
                        ease: 'power2.out',
                        scrollTrigger: {
                            trigger: section,
                            start: 'top 85%',
                            toggleActions: 'play none none none'
                        }
                    });
                }
            });

            // Separators — scale + fade
            gsap.utils.toArray('.seccion-separador').forEach(function(sep) {
                gsap.to(sep, {
                    opacity: 1,
                    scale: 1,
                    duration: 0.6,
                    ease: 'back.out(1.7)',
                    scrollTrigger: {
                        trigger: sep,
                        start: 'top 90%',
                        toggleActions: 'play none none none'
                    }
                });
            });

            // Refresh after a moment for mobile
            setTimeout(function() { ScrollTrigger.refresh(); }, 500);

            // Footer — fade in
            gsap.to('.site-footer', {
                opacity: 1,
                y: 0,
                duration: 0.8,
                ease: 'power2.out',
                scrollTrigger: {
                    trigger: '.site-footer',
                    start: 'top 90%',
                    toggleActions: 'play none none none'
                }
            });
        }
    </script>
</body>
</html>
